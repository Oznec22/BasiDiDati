{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <title>Registrazione - Fiera Fumetti</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #3a3050);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .home-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #ff6e00, #ff5722);
            color: white;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(255, 87, 34, 0.6);
            transition: all 0.3s ease;
        }

        .home-button:hover {
            background: linear-gradient(45deg, #ff5722, #e64a19);
            box-shadow: 0 8px 30px rgba(230, 74, 25, 0.9);
            transform: scale(1.05);
        }

        .register-container {
            background: rgba(255, 87, 34, 0.15);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 87, 34, 0.25);
            padding: 40px 50px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-weight: 800;
            font-size: 2.8rem;
            color: #ff6e00;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #ff5722;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        select {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.5);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: box-shadow 0.3s ease;
        }

        input::placeholder {
            color: #ffd8b1;
        }

        input:focus,
        select:focus {
            box-shadow: 0 0 25px #ff6e00;
            background: rgba(255, 255, 255, 0.15);
        }

        select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg fill='orange' height='24' viewBox='0 0 24 24' width='24' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
        background-repeat: no-repeat;
        background-position: right 12px center;
        background-size: 18px;
        padding-right: 40px;
        padding: 12px 18px;
        border-radius: 12px;
        border: none;
        font-size: 1rem;
        font-weight: 500;
        outline: none;
        box-shadow: 0 0 15px rgba(255, 87, 34, 0.5);
        background: rgba(255, 255, 255, 0.9);
        color: #1f1c2c;
        transition: box-shadow 0.3s ease;
    }
    
    /* Cambia colore delle opzioni nel menù a tendina */
    select option {
        color: #1f1c2c;
        background-color: #fff;
    }


        button[type="submit"] {
            background: linear-gradient(45deg, #ff6e00, #ff5722);
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 12px 0;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 87, 34, 0.8);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        button[type="submit"]:hover {
            background: linear-gradient(45deg, #ff5722, #e64a19);
            box-shadow: 0 12px 40px rgba(230, 74, 25, 0.9);
            transform: scale(1.05);
        }

        .links {
            margin-top: 20px;
            font-size: 0.95rem;
            color: #ffd8b1;
            text-shadow: 0 0 10px rgba(255, 87, 34, 0.7);
        }

        .links a {
            color: #ff6e00;
            text-decoration: none;
            font-weight: 700;
            margin-left: 6px;
            transition: color 0.3s ease;
        }

        .links a:hover {
            color: #ff5722;
        }
    </style>
</head>
<body>
    <a href="{% url 'index' %}" class="home-button">Home</a>

    <div class="register-container" role="main" aria-labelledby="register-title">
        <h1 id="register-title">Registrati</h1>

        <form method="POST">
            {% csrf_token %}
            
            {{ form.username.errors }}
            <input type="text" name="username" placeholder="Username" value="{{ form.username.value|default_if_none:'' }}" required>

            {{ form.email.errors }}
            <input type="email" name="email" placeholder="Email" value="{{ form.email.value|default_if_none:'' }}" required>

            {{ form.password1.errors }}
            <input type="password" name="password1" placeholder="Password" required>

            {{ form.password2.errors }}
            <input type="password" name="password2" placeholder="Conferma Password" required>

            {{ form.ruolo.errors }}
            <select name="ruolo" required>
                <option value="">Seleziona il tuo ruolo</option>
                {% for key, value in form.fields.ruolo.choices %}
                    {% if key %}
                        <option value="{{ key }}" {% if form.ruolo.value == key %}selected{% endif %}>{{ value }}</option>
                    {% endif %}
                {% endfor %}
            </select>

            <button type="submit">Registrati</button>
        </form>

        <p class="links">
            Hai già un account?
            <a href="{% url 'login' %}">Accedi qui</a>
        </p>
    </div>
</body>
</html>
