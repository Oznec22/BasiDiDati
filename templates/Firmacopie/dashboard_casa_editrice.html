{% block content %}
<div style="background: linear-gradient(135deg, #1f1c2c, #3a3050); min-height: 100vh; padding: 40px 20px; font-family: 'Poppins', sans-serif; color: #fff; margin: 0;">

  <div style="max-width: 960px; margin: 0 auto; padding-top: 40px;">

    <h1 style="font-weight: 800; font-size: 3rem; color: #ff6e00; margin-bottom: 50px; text-align: center; text-shadow: 0 0 25px #ff5722;">
      Dashboard Casa Editrice
    </h1>

    <div style="display: flex; flex-wrap: wrap; gap: 30px; justify-content: center;">

      {% for card in cards %}
      <div style="background: rgba(255, 87, 34, 0.18); border-radius: 25px; box-shadow: 0 0 35px rgba(255, 87, 34, 0.4); flex: 1 1 280px; max-width: 280px; padding: 30px 25px; text-align: center; color: #ffd8b1; transition: transform 0.3s ease, box-shadow 0.3s ease;">
        <h5 style="font-weight: 700; font-size: 1.4rem; margin-bottom: 15px; color: #ff6e00; text-shadow: 0 0 10px #ff5722;">
          {{ card.title }}
        </h5>
        <p style="font-weight: 500; font-size: 1.05rem; margin-bottom: 28px; line-height: 1.4;">
          {{ card.text }}
        </p>
        <a href="{% url card.url %}" style="display: inline-block; background: linear-gradient(45deg, #ff6e00, #ff5722); color: white; font-weight: 700; padding: 14px 26px; border-radius: 40px; text-decoration: none; box-shadow: 0 8px 35px rgba(255, 87, 34, 0.9); user-select: none; transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;">
          {{ card.btn }}
        </a>
      </div>
      {% endfor %}

    </div>
  </div>
</div>

<script>
  const cards = document.querySelectorAll('div[style*="background: rgba(255, 87, 34, 0.18)"]');
  cards.forEach(card => {
    card.addEventListener('mouseenter', () => {
      card.style.transform = 'translateY(-10px)';
      card.style.boxShadow = '0 10px 40px rgba(255, 87, 34, 0.7)';
    });
    card.addEventListener('mouseleave', () => {
      card.style.transform = 'none';
      card.style.boxShadow = '0 0 35px rgba(255, 87, 34, 0.4)';
    });
  });

  const links = document.querySelectorAll('a[style*="background: linear-gradient"]');
  links.forEach(link => {
    link.addEventListener('mouseenter', () => {
      link.style.background = 'linear-gradient(45deg, #ff5722, #e64a19)';
      link.style.boxShadow = '0 12px 45px rgba(230, 74, 25, 1)';
      link.style.transform = 'scale(1.05)';
    });
    link.addEventListener('mouseleave', () => {
      link.style.background = 'linear-gradient(45deg, #ff6e00, #ff5722)';
      link.style.boxShadow = '0 8px 35px rgba(255, 87, 34, 0.9)';
      link.style.transform = 'none';
    });
  });
</script>
{% endblock %}
