<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Fiera Fumetti</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #3a3050);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-weight: 800;
            font-size: 3rem;
            color: #ff6e00;
            text-shadow: 0 0 20px #ff5722;
            margin-bottom: 30px;
        }

        .button {
            background: linear-gradient(45deg, #ff6e00, #ff5722);
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(255, 87, 34, 0.8);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .button:hover {
            background: linear-gradient(45deg, #ff5722, #e64a19);
            box-shadow: 0 12px 40px rgba(230, 74, 25, 0.9);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Benvenuto!</h1>
    <a href="#" class="button">Torna alla Home</a>

</body>
</html>
