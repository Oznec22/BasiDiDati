{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica Profilo - Comicon 2026</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: #ff6e00;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        header .button {
            background: #fff;
            color: #ff6e00;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 10px;
            display: inline-block;
        }
        .card {
            max-width: 500px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            margin: 40px auto;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }
        label {
            font-weight: 600;
            display: block;
            margin-top: 15px;
        }
        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .button {
            background: #ff6e00;
            color: #fff;
            border: none;
            padding: 12px 20px;
            margin-top: 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }
        .button:hover {
            background: #e65c00;
        }
    </style>
</head>
<body>
<header>
    <h1>Modifica il tuo profilo</h1>
    <a href="{% url 'dashboard_casa_editrice' %}" class="button">Torna alla Home</a>
</header>

<main>
    <div class="card">
        <form method="post">
            {% csrf_token %}
            <label for="first_name">Nome:</label>
            <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}">

            <label for="last_name">Cognome:</label>
            <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ user.email }}">

            <button type="submit" class="button">💾 Salva modifiche</button>
        </form>
    </div>
</main>
</body>
</html>
