{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica Casa Editrice</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f4f9;
        }
        .card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Modifica Casa Editrice</h1>

    <form method="POST" action="">
        {% csrf_token %}
        <label for="id_nome">Nome:</label>
        <input type="text" id="id_nome" name="nome" value="{{ casa_editrice.nome }}" required>

        <label for="id_indirizzo">Indirizzo:</label>
        <input type="text" id="id_indirizzo" name="indirizzo" value="{{ casa_editrice.indirizzo }}" required>

        <button type="submit">Salva modifiche</button>
    </form>

    <a href="{% url 'dashboard_casa_editrice' %}" class="link">Torna alla home</a>
</div>

</body>
</html>
